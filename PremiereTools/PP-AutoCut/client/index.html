<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>PP-AutoCut</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>✂️ PP-AutoCut</h1>
            <p class="subtitle">ワンクリック自動カット</p>
        </header>

        <section class="main-section">
            <div class="status-bar" id="statusBar">
                <span class="status-icon">📋</span>
                <span class="status-text" id="statusText">準備完了</span>
            </div>

            <!-- ワンクリック自動カット -->
            <div class="auto-section">
                <h3>🚀 自動カット</h3>
                <p class="description">選択クリップを分析して無音区間を自動でカットします</p>
                <button class="btn btn-primary btn-large" id="btnAutocut">
                    ✂️ 自動カット実行
                </button>
            </div>

            <hr class="divider">

            <!-- 手動ファイル指定 -->
            <details class="manual-section">
                <summary>📁 ファイルからカット位置を指定</summary>
                <div class="file-input">
                    <label>タイミングファイル (SRT/TXT/JSON):</label>
                    <div class="file-row">
                        <input type="text" id="filePath" placeholder="ファイルを選択..." readonly>
                        <button class="btn btn-small" id="btnBrowse">📁</button>
                    </div>
                </div>
                <button class="btn btn-secondary" id="btnCutFromFile">
                    ファイルからカット
                </button>
            </details>

            <div class="settings-group">
                <details>
                    <summary>⚙️ カット設定</summary>
                    <div class="setting-item">
                        <label for="silenceThreshold">無音カット閾値 (秒):</label>
                        <input type="number" id="silenceThreshold" value="0.5" min="0.1" max="5" step="0.1">
                    </div>
                    <div class="setting-item">
                        <label for="serverUrl">サーバーURL:</label>
                        <input type="text" id="serverUrl" value="http://localhost:5050">
                    </div>
                </details>
            </div>
        </section>

        <section class="preview-section" id="previewSection" style="display: none;">
            <h3>📋 カット結果</h3>
            <div class="cut-list" id="cutList"></div>
            <div class="cut-stats" id="cutStats"></div>
        </section>
    </div>

    <script src="CSInterface.js"></script>
    <script src="main.js"></script>
</body>

</html>
