<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>PP-Caption</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .template-select {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .template-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #555;
            border-radius: 8px;
            background: #2a2a2a;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }

        .template-btn:hover {
            border-color: #888;
        }

        .template-btn.active {
            border-color: #4fc3f7;
            background: #1a3a4a;
        }

        .template-btn .icon {
            font-size: 24px;
            display: block;
            margin-bottom: 4px;
        }

        .template-btn .size {
            font-size: 11px;
            opacity: 0.7;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 16px;
        }

        .btn-action {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-marker {
            background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
            color: white;
        }

        .btn-marker:hover {
            background: linear-gradient(135deg, #ffb74d 0%, #ff9800 100%);
        }

        .btn-duplicate {
            background: linear-gradient(135deg, #9c27b0 0%, #7b1fa2 100%);
            color: white;
        }

        .btn-duplicate:hover {
            background: linear-gradient(135deg, #ba68c8 0%, #9c27b0 100%);
        }

        .btn-action:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .section-divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            gap: 12px;
        }

        .section-divider hr {
            flex: 1;
            border: none;
            border-top: 1px solid #444;
        }

        .section-divider span {
            color: #888;
            font-size: 12px;
        }

        .workflow-step {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .workflow-step .step-num {
            background: #4fc3f7;
            color: #000;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
        }

        .workflow-step.completed .step-num {
            background: #4caf50;
        }

        .workflow-step .step-text {
            flex: 1;
        }

        .workflow-step .step-status {
            font-size: 16px;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>💬 PP-Caption</h1>
            <p class="subtitle">テロップ自動挿入</p>
        </header>

        <section class="main-section">
            <div class="status-bar" id="statusBar">
                <span class="status-icon">📋</span>
                <span class="status-text" id="statusText">準備完了</span>
            </div>

            <!-- ワークフロー表示 -->
            <div class="workflow-steps" id="workflowSteps">
                <div class="workflow-step" id="step1">
                    <span class="step-num">1</span>
                    <span class="step-text">タイミングファイルを読み込み</span>
                    <span class="step-status" id="step1Status">⬜</span>
                </div>
                <div class="workflow-step" id="step2">
                    <span class="step-num">2</span>
                    <span class="step-text">マーカーを挿入</span>
                    <span class="step-status" id="step2Status">⬜</span>
                </div>
                <div class="workflow-step" id="step3">
                    <span class="step-num">3</span>
                    <span class="step-text">テキストレイヤーを作成して選択</span>
                    <span class="step-status" id="step3Status">⬜</span>
                </div>
                <div class="workflow-step" id="step4">
                    <span class="step-num">4</span>
                    <span class="step-text">マーカー位置に複製</span>
                    <span class="step-status" id="step4Status">⬜</span>
                </div>
            </div>

            <div class="section-divider">
                <hr><span>STEP 1</span>
                <hr>
            </div>

            <div class="file-input">
                <label>タイミングファイル (SRT/TXT/JSON):</label>
                <div class="file-row">
                    <input type="text" id="filePath" placeholder="ファイルを選択..." readonly>
                    <button class="btn btn-small" id="btnBrowse">📁</button>
                </div>
            </div>

            <div class="settings-group">
                <label>テンプレートサイズ:</label>
                <div class="template-select">
                    <div class="template-btn active" id="btnLandscape" data-type="landscape">
                        <span class="icon">🖥️</span>
                        <span class="label">横動画</span>
                        <span class="size">1920×1080 (16:9)</span>
                    </div>
                    <div class="template-btn" id="btnShort" data-type="short">
                        <span class="icon">📱</span>
                        <span class="label">ショート</span>
                        <span class="size">1080×1920 (9:16)</span>
                    </div>
                </div>
            </div>

            <div class="settings-group">
                <details>
                    <summary>⚙️ テロップ設定</summary>
                    <div class="setting-item">
                        <label for="trackIndex">配置トラック:</label>
                        <select id="trackIndex">
                            <option value="1">V1</option>
                            <option value="2" selected>V2</option>
                            <option value="3">V3</option>
                            <option value="4">V4</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label for="fontSize">フォントサイズ:</label>
                        <input type="number" id="fontSize" value="60" min="12" max="200">
                    </div>
                    <div class="setting-item">
                        <label for="fontFamily">フォント:</label>
                        <input type="text" id="fontFamily" value="Hiragino Sans">
                    </div>
                    <div class="setting-item">
                        <label for="position">位置:</label>
                        <select id="position">
                            <option value="bottom" selected>下部</option>
                            <option value="center">中央</option>
                            <option value="top">上部</option>
                        </select>
                    </div>
                </details>
            </div>

            <div class="section-divider">
                <hr><span>STEP 2</span>
                <hr>
            </div>

            <div class="action-buttons">
                <button class="btn-action btn-marker" id="btnInsertMarkers">
                    <span>📍</span>
                    <span>マーカー挿入</span>
                </button>
            </div>

            <div class="section-divider">
                <hr><span>STEP 3-4</span>
                <hr>
            </div>

            <div class="action-buttons">
                <button class="btn-action btn-duplicate" id="btnDuplicateFromMarkers">
                    <span>🔄</span>
                    <span>選択レイヤーをマーカー位置に複製</span>
                </button>
            </div>
        </section>

        <section class="preview-section" id="previewSection" style="display: none;">
            <h3>📋 挿入プレビュー</h3>
            <div class="caption-list" id="captionList"></div>
            <div class="caption-stats" id="captionStats"></div>
        </section>
    </div>

    <script src="CSInterface.js"></script>
    <script src="main.js"></script>
</body>

</html>
